<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Fit — First Light</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Red+Hat+Display:wght@800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { min-height: 100svh; display: flex; flex-direction: column; }

        .quiz-wrap {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 7rem 2rem 4rem; min-height: 100svh;
        }

        /* Intro */
        .quiz-intro { width: 100%; max-width: 580px; margin-bottom: 3rem; }
        .quiz-title {
            font-family: 'Red Hat Display', sans-serif;
            font-size: clamp(1.9rem, 4.2vw, 2.75rem);
            font-weight: 800; line-height: 1.15;
            letter-spacing: 0.01em;
            margin-bottom: 0.85rem;
        }
        .quiz-sub { font-size: 1rem; color: var(--t2); line-height: 1.6; }

        /* Progress */
        .quiz-progress {
            width: 100%; max-width: 580px;
            margin-bottom: 3.5rem;
            display: flex; align-items: center; gap: 1rem;
        }
        .progress-bar {
            flex: 1; height: 1px; background: var(--border-n);
            position: relative; overflow: hidden;
        }
        .progress-fill {
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 100%; background: var(--amber);
            transform-origin: left;
            transform: scaleX(0);
            transition: transform 0.5s var(--ease);
        }
        .progress-label {
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--t3); white-space: nowrap;
        }

        /* Question */
        .quiz-q {
            width: 100%; max-width: 580px;
            animation: fadeUp 0.5s var(--ease) both;
        }
        .quiz-q.exit {
            animation: fadeDown 0.3s var(--ease) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: none; }
        }
        @keyframes fadeDown {
            from { opacity: 1; transform: none; }
            to   { opacity: 0; transform: translateY(-12px); }
        }

        .q-text {
            font-family: 'Red Hat Display', sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            font-weight: 800; line-height: 1.2;
            letter-spacing: 0.01em;
            margin-bottom: 2.5rem; text-wrap: balance;
        }

        .quiz-back {
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--t3);
            background: none; border: none; cursor: pointer;
            padding: 0; margin-bottom: 1.5rem; display: block;
            font-family: 'DM Sans', sans-serif;
            transition: color 0.2s;
        }
        .quiz-back:hover { color: var(--bone); }

        .answers { display: flex; flex-direction: column; gap: 0.75rem; }
        .answer {
            border: 1px solid var(--border-d);
            padding: 1.1rem 1.5rem;
            cursor: pointer; text-align: left;
            background: transparent;
            color: var(--t2); font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; font-weight: 300; line-height: 1.5;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            width: 100%;
        }
        .answer:hover {
            border-color: var(--amber);
            color: var(--bone);
            background: oklch(65% 0.12 55 / 0.06);
        }
        .answer.selected {
            border-color: var(--amber);
            background: oklch(65% 0.12 55 / 0.1);
            color: var(--bone);
        }

        /* Results */
        .quiz-result {
            width: 100%; max-width: 580px;
            animation: fadeUp 0.6s var(--ease) 0.1s both;
        }
        .result-kicker {
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.22em;
            text-transform: uppercase; color: var(--amber);
            display: block; margin-bottom: 1.5rem;
        }
        .result-vid {
            width: 100%; aspect-ratio: 20/9; overflow: hidden;
            background: var(--night-surface);
            margin-bottom: 1.75rem;
        }
        .result-vid .offer-vid-fallback { font-size: clamp(2rem, 6vw, 3.5rem); }
        .result-para {
            font-size: 0.98rem; color: var(--t2); line-height: 1.9;
            max-width: 52ch; margin-bottom: 2.75rem;
        }
        .result-actions { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .result-retry {
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--t3);
            background: none; border: none; cursor: pointer;
            text-decoration: underline; text-underline-offset: 3px;
            transition: color 0.2s; font-family: 'DM Sans', sans-serif;
        }
        .result-retry:hover { color: var(--bone); }

        .quiz-hidden { display: none; }
    </style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay"></div>
<aside class="drawer" id="drawer">
    <div class="drawer-head">
        <a href="index.html" class="drawer-logo"><img src="logo.svg" alt="First Light" class="drawer-logo-img"></a>
        <button class="drawer-close" id="drawerClose" aria-label="Close menu">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
    </div>
    <nav class="drawer-nav">
        <a href="index.html#hero" class="drawer-link drawer-link-quiz">Home</a>
        <a href="index.html#wwd" class="drawer-link drawer-link-quiz">What We Do</a>
        <a href="index.html#beliefs" class="drawer-link drawer-link-quiz">What We Believe</a>
        <div class="drawer-offers-group">
            <a href="index.html#offers" class="drawer-link drawer-link-quiz drawer-link-offers">Offers</a>
            <div class="drawer-tier-list">
                <a href="spark.html" class="drawer-link drawer-tier-link" data-page="spark.html">
                    <span class="drawer-tier-name">Spark</span>
                    <span class="drawer-tier-desc">Start building real income</span>
                </a>
                <a href="blaze.html" class="drawer-link drawer-tier-link" data-page="blaze.html">
                    <span class="drawer-tier-name">Blaze</span>
                    <span class="drawer-tier-desc">Compound your name and income</span>
                </a>
                <a href="quiz.html" class="drawer-link drawer-link-findfit" data-page="quiz.html">Find Your Fit</a>
            </div>
        </div>
    </nav>
</aside>

<nav class="nav">
    <a href="index.html" class="nav-logo" id="navLogo" aria-haspopup="true" aria-expanded="false"><img src="logo.svg" alt="First Light" class="nav-logo-img"></a>
</nav>

<main class="quiz-wrap">
    <!-- Intro -->
    <div class="quiz-intro">
        <h1 class="quiz-title">Find your fit.</h1>
        <p class="quiz-sub" id="quizSub">Four questions. Two minutes. A clear recommendation and why.</p>
    </div>

    <!-- Progress bar -->
    <div class="quiz-progress" id="quizProgress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="transform:scaleX(0)"></div></div>
        <span class="progress-label" id="progressLabel">1 of 4</span>
    </div>

    <!-- Question container -->
    <div id="quizQuestion" class="quiz-q"></div>

    <!-- Result container -->
    <div id="quizResult" class="quiz-result quiz-hidden"></div>
</main>

<footer>
    <a href="index.html" class="foot-logo"><img src="logo.svg" alt="First Light" class="foot-logo-img"></a>
    <nav class="foot-links">
        <a href="spark.html" class="foot-link">Spark</a>
        <a href="blaze.html" class="foot-link">Blaze</a>
    </nav>
    <p class="foot-copy">© 2026 First Light</p>
</footer>

<script src="nav.js"></script>
<script>
(function () {
    const questions = [
        {
            text: "Where are you in the sport?",
            answers: [
                { text: "I train and compete as a serious hobbyist — I've got a job or other income, but I'm good and I want my sport to start paying too", scores: { spark: 3 } },
                { text: "I'm a dedicated amateur chasing this seriously — competing regularly, building toward something real", scores: { spark: 3 } },
                { text: "I'm a working pro or top-level amateur — the credibility is there, the income isn't yet", scores: { blaze: 3 } },
                { text: "I'm an established name — real record, real recognition in my sport", scores: { blaze: 3 } }
            ]
        },
        {
            text: "What does your presence online look like?",
            answers: [
                { text: "Small but real — a few hundred to a couple thousand who actually care", scores: { spark: 3 } },
                { text: "Building — somewhere between 2k and 20k, growing when I put in the effort", scores: { spark: 3 } },
                { text: "Solid — 20k to 100k, real engagement, known in my scene", scores: { blaze: 3 } },
                { text: "Significant — 100k+, or a name that gets recognized beyond the follower count", scores: { blaze: 3 } }
            ]
        },
        {
            text: "What are you earning from the sport today?",
            answers: [
                { text: "Basically nothing yet — it all comes out of my own pocket", scores: { spark: 3 } },
                { text: "A little on the side — the odd private lesson, a small gig here and there", scores: { spark: 3 } },
                { text: "A few streams starting to add up, but nothing steady", scores: { blaze: 3 } },
                { text: "Real income from fights, coaching, or deals — just well below what my name is worth", scores: { blaze: 3 } }
            ]
        },
        {
            text: "What would winning look like a year from now?",
            answers: [
                { text: "Some real side income from the sport I love — without gambling my day job on it", scores: { spark: 3 } },
                { text: "Enough coming in that I can take this full-time, or go all-in on what I've started", scores: { spark: 3 } },
                { text: "Turning the name I'm building into steady, serious money", scores: { blaze: 3 } },
                { text: "Earning like the name I've already made", scores: { blaze: 3 } }
            ]
        }
    ];

    const paragraphs = {
        spark: "You've got something real, and it isn't paying what it should yet. Spark puts a team behind you — content produced and published, sponsors sourced and pitched, your direction sharpened every month — while you keep training and keep your day handled. You stay as involved as you want; it just stops depending on your time. You don't need to bet your career to start earning from it.",
        blaze: "Your name is worth more than your current setup is producing. Blaze fixes that — a commercial operation run personally by the founder, across every platform, with priority on everything and direct access to the person building it. Deliberately few slots."
    };

    const tierLinks = { spark: 'spark.html', blaze: 'blaze.html' };
    const tierLabels = { spark: 'Explore Spark →', blaze: 'Explore Blaze →' };
    const tierVideos = { spark: 'spark-offer.mp4', blaze: 'blaze-offer.mp4' };

    let current = 0;
    let scores = { spark: 0, blaze: 0 };
    let answerLog = [];

    const qContainer = document.getElementById('quizQuestion');
    const rContainer = document.getElementById('quizResult');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const quizProgress = document.getElementById('quizProgress');
    const quizSub = document.getElementById('quizSub');

    function setProgress(index) {
        const pct = (index / questions.length) * 100;
        progressFill.style.transform = 'scaleX(' + pct / 100 + ')';
        progressLabel.textContent = (index + 1) + ' of ' + questions.length;
    }

    function goBack() {
        if (current === 0) return;
        const lastIdx = answerLog.pop();
        const prevAnswer = questions[current - 1].answers[lastIdx];
        Object.entries(prevAnswer.scores).forEach(function (kv) { scores[kv[0]] -= kv[1]; });
        current--;
        renderQuestion(current);
    }

    function renderQuestion(index) {
        quizSub.style.display = index === 0 ? '' : 'none';
        setProgress(index);
        const q = questions[index];
        qContainer.innerHTML =
            (index > 0 ? '<button class="quiz-back" id="backBtn">← Back</button>' : '') +
            '<p class="q-text">' + q.text + '</p>' +
            '<div class="answers">' +
            q.answers.map(function (a, i) {
                return '<button class="answer" data-idx="' + i + '">' + a.text + '</button>';
            }).join('') +
            '</div>';
        qContainer.className = 'quiz-q';

        if (index > 0) {
            document.getElementById('backBtn').addEventListener('click', goBack);
        }

        qContainer.querySelectorAll('.answer').forEach(function (btn) {
            btn.addEventListener('click', function () {
                btn.classList.add('selected');
                const aIdx = parseInt(btn.dataset.idx);
                const chosen = q.answers[aIdx];
                Object.entries(chosen.scores).forEach(function (kv) { scores[kv[0]] += kv[1]; });
                answerLog.push(aIdx);

                setTimeout(function () {
                    qContainer.className = 'quiz-q exit';
                    setTimeout(function () {
                        current++;
                        if (current < questions.length) {
                            renderQuestion(current);
                        } else {
                            showResult();
                        }
                    }, 300);
                }, 280);
            });
        });
    }

    function getWinner() {
        // Tie goes to Spark: fighters below Spark's level self-disqualify at the
        // price, so the quiz doesn't need to catch them — only a clear read on an
        // established, underperforming name should tip the result to Blaze.
        return scores.blaze > scores.spark ? 'blaze' : 'spark';
    }

    function showResult() {
        quizSub.style.display = 'none';
        const winner = getWinner();
        const para = paragraphs[winner];
        const link = tierLinks[winner];
        const label = tierLabels[winner];
        const video = tierVideos[winner];
        const name = winner.charAt(0).toUpperCase() + winner.slice(1);

        quizProgress.style.display = 'none';
        qContainer.style.display = 'none';
        rContainer.classList.remove('quiz-hidden');
        rContainer.innerHTML =
            '<span class="result-kicker">Your recommended path</span>' +
            '<div class="result-vid offer-vid">' +
            '<span class="offer-vid-fallback">' + name + '</span>' +
            '<video autoplay muted loop playsinline src="' + video + '" onerror="this.style.display=\'none\'"></video>' +
            '</div>' +
            '<p class="result-para">' + para + '</p>' +
            '<div class="result-actions">' +
            '<a href="' + link + '" class="btn btn-amber">' + label + '</a>' +
            '<button class="result-retry" id="retryBtn">Start over</button>' +
            '</div>';

        document.getElementById('retryBtn').addEventListener('click', function () {
            scores = { spark: 0, blaze: 0 };
            answerLog = [];
            current = 0;
            quizProgress.style.display = '';
            qContainer.style.display = '';
            rContainer.classList.add('quiz-hidden');
            renderQuestion(0);
        });
    }

    renderQuestion(0);
})();
</script>
</body>
</html>
