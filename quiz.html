<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Path — First Light</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { min-height: 100svh; display: flex; flex-direction: column; }

        .quiz-wrap {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 7rem 2rem 4rem; min-height: 100svh;
        }

        /* Progress */
        .quiz-progress {
            width: 100%; max-width: 580px;
            margin-bottom: 3.5rem;
            display: flex; align-items: center; gap: 1rem;
        }
        .progress-bar {
            flex: 1; height: 1px; background: var(--border-n);
            position: relative; overflow: hidden;
        }
        .progress-fill {
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 100%; background: var(--amber);
            transform-origin: left;
            transform: scaleX(0);
            transition: transform 0.5s var(--ease);
        }
        .progress-label {
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--t3); white-space: nowrap;
        }

        /* Question */
        .quiz-q {
            width: 100%; max-width: 580px;
            animation: fadeUp 0.5s var(--ease) both;
        }
        .quiz-q.exit {
            animation: fadeDown 0.3s var(--ease) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: none; }
        }
        @keyframes fadeDown {
            from { opacity: 1; transform: none; }
            to   { opacity: 0; transform: translateY(-12px); }
        }

        .q-text {
            font-family: 'Red Hat Display', sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            font-weight: 800; line-height: 1.2;
            letter-spacing: 0.01em;
            margin-bottom: 2.5rem; text-wrap: balance;
        }

        .answers { display: flex; flex-direction: column; gap: 0.75rem; }
        .answer {
            border: 1px solid var(--border-d);
            padding: 1.1rem 1.5rem;
            cursor: pointer; text-align: left;
            background: transparent;
            color: var(--t2); font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; font-weight: 300; line-height: 1.5;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            width: 100%;
        }
        .answer:hover {
            border-color: var(--amber);
            color: var(--bone);
            background: oklch(65% 0.12 55 / 0.06);
        }
        .answer.selected {
            border-color: var(--amber);
            background: oklch(65% 0.12 55 / 0.1);
            color: var(--bone);
        }

        /* Results */
        .quiz-result {
            width: 100%; max-width: 580px;
            animation: fadeUp 0.6s var(--ease) 0.1s both;
        }
        .result-kicker {
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.22em;
            text-transform: uppercase; color: var(--amber);
            display: block; margin-bottom: 1.5rem;
        }
        .result-tier {
            font-family: 'Red Hat Display', sans-serif;
            font-size: clamp(3rem, 7vw, 5rem);
            font-weight: 800; color: var(--bone);
            letter-spacing: 0.02em; line-height: 1;
            display: block; margin-bottom: 1.75rem;
        }
        .result-para {
            font-size: 0.98rem; color: var(--t2); line-height: 1.9;
            max-width: 52ch; margin-bottom: 2.75rem;
        }
        .result-actions { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .result-retry {
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--t3);
            background: none; border: none; cursor: pointer;
            text-decoration: underline; text-underline-offset: 3px;
            transition: color 0.2s; font-family: 'DM Sans', sans-serif;
        }
        .result-retry:hover { color: var(--bone); }

        .quiz-hidden { display: none; }
    </style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay"></div>
<aside class="drawer" id="drawer">
    <div class="drawer-head">
        <a href="index.html" class="drawer-logo"><img src="logo.svg" alt="First Light" class="drawer-logo-img"></a>
        <button class="drawer-close" id="drawerClose" aria-label="Close menu">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
    </div>
    <nav class="drawer-nav">
        <a href="index.html" class="drawer-link" data-page="index.html">Home</a>
        <div class="drawer-sep"></div>
        <span class="drawer-section-label">Offers</span>
        <a href="spark.html" class="drawer-link drawer-tier-link" data-page="spark.html">
            <span class="drawer-tier-name">Spark</span>
            <span class="drawer-tier-desc">Start earning from the sport</span>
        </a>
        <a href="rise.html" class="drawer-link drawer-tier-link" data-page="rise.html">
            <span class="drawer-tier-name">Rise</span>
            <span class="drawer-tier-desc">Build serious income</span>
        </a>
        <a href="reign.html" class="drawer-link drawer-tier-link" data-page="reign.html">
            <span class="drawer-tier-name">Reign</span>
            <span class="drawer-tier-desc">Compound what you've built</span>
        </a>
        <a href="quiz.html" class="drawer-link drawer-link-quiz" data-page="quiz.html">Find Your Fit</a>
    </nav>
</aside>

<nav class="nav">
    <a href="index.html" class="nav-logo"><img src="logo.svg" alt="First Light" class="nav-logo-img"></a>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
</nav>

<main class="quiz-wrap">
    <!-- Progress bar -->
    <div class="quiz-progress" id="quizProgress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="transform:scaleX(0)"></div></div>
        <span class="progress-label" id="progressLabel">1 of 5</span>
    </div>

    <!-- Question container -->
    <div id="quizQuestion" class="quiz-q"></div>

    <!-- Result container -->
    <div id="quizResult" class="quiz-result quiz-hidden"></div>
</main>

<footer>
    <a href="index.html" class="foot-logo"><img src="logo.svg" alt="First Light" class="foot-logo-img"></a>
    <nav class="foot-links">
        <a href="spark.html" class="foot-link">Spark</a>
        <a href="rise.html" class="foot-link">Rise</a>
        <a href="reign.html" class="foot-link">Reign</a>
    </nav>
    <p class="foot-copy">© 2026 First Light</p>
</footer>

<script src="nav.js"></script>
<script>
(function () {
    const questions = [
        {
            text: "What best describes your relationship with the sport right now?",
            answers: [
                { text: "I train seriously — it's a big part of my life, but not my career", scores: { spark: 3 } },
                { text: "I'm actively building toward this being my full-time career", scores: { rise: 3 } },
                { text: "I compete or coach professionally — this is what I do", scores: { rise: 2, reign: 1 } },
                { text: "I'm established. Known name, real record, real recognition in my sport", scores: { reign: 3 } }
            ]
        },
        {
            text: "What does your current online presence look like?",
            answers: [
                { text: "Small — a few hundred to a couple of thousand followers", scores: { spark: 3 } },
                { text: "Growing — building an audience, somewhere between 1k and 20k", scores: { spark: 1, rise: 2 } },
                { text: "Solid — 20k to 100k, real engagement, people know me in the sport", scores: { rise: 3 } },
                { text: "Significant — 100k+ or a recognizable name beyond the numbers", scores: { reign: 3 } }
            ]
        },
        {
            text: "What does your income from martial arts look like right now?",
            answers: [
                { text: "Nothing yet — I haven't started monetizing", scores: { spark: 3 } },
                { text: "A little — mostly from teaching, private lessons, or occasional gigs", scores: { spark: 1, rise: 2 } },
                { text: "Growing — a few income streams, but inconsistent", scores: { rise: 3 } },
                { text: "Real — I have regular income from fights, brand deals, or coaching", scores: { reign: 3 } }
            ]
        },
        {
            text: "What's your biggest frustration right now?",
            answers: [
                { text: "I don't know where to start on the business side of this sport", scores: { spark: 3 } },
                { text: "I have presence but can't turn it into consistent income", scores: { rise: 3 } },
                { text: "I'm earning, but I know I'm leaving significant money on the table", scores: { rise: 1, reign: 2 } },
                { text: "My name is worth more than what my platform is actually producing", scores: { reign: 3 } }
            ]
        },
        {
            text: "What does winning look like for you in 12 months?",
            answers: [
                { text: "The sport pays for itself — a side income I'm genuinely proud of", scores: { spark: 3 } },
                { text: "I'm generating real money that changes what's possible for me", scores: { rise: 3 } },
                { text: "I've made the leap, or seriously leveled up what I already have", scores: { rise: 1, reign: 2 } },
                { text: "My name is a compounding asset — building something that outlasts my career", scores: { reign: 3 } }
            ]
        }
    ];

    const paragraphs = {
        spark: {
            tiny: "You're starting from where most people start. Spark is designed for exactly where you are: serious about the sport, not yet thinking about the business side. The brand definition and playbook are done for you in the first week. Everything after that is execution — and we built the system for someone with your schedule and your starting point.",
            growing: "You've already got a foothold — a growing presence that hasn't been given the right architecture yet. Spark turns that into a real side income: brand clarity done for you, a content system, and a playbook built for athletes who want to earn without becoming marketers."
        },
        rise: {
            close: "You can feel you're close — and that's an accurate read. Rise gives you the team and the system to close the gap: content and sponsor outreach executed alongside you, monthly strategy to sharpen your direction, and a $1,000 guarantee in 90 days to put our conviction in writing.",
            earning: "You're already generating something, which means the infrastructure is starting to work. Rise accelerates it: done-with-you execution, a clear income target, and a team that moves your pipeline forward every week while you focus on training."
        },
        reign: {
            established: "You've built the name. What's missing is the machine behind it. Reign handles everything off the mats — content, sponsorship, press, negotiation, logistics — so your platform finally earns at the level your career has earned.",
            default: "Your name is worth more than what your current setup is producing. Reign is built to fix that: a full team executing everything off the mats, guaranteed monthly deliverables, and the flexibility to exit after month three if it's not working. It will work."
        }
    };

    const tierLinks = { spark: 'spark.html', rise: 'rise.html', reign: 'reign.html' };
    const tierLabels = { spark: 'Explore Spark', rise: 'Explore Rise', reign: 'Explore Reign' };

    let current = 0;
    let scores = { spark: 0, rise: 0, reign: 0 };
    let answerLog = [];

    const qContainer = document.getElementById('quizQuestion');
    const rContainer = document.getElementById('quizResult');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const quizProgress = document.getElementById('quizProgress');

    function setProgress(index) {
        const pct = (index / questions.length) * 100;
        progressFill.style.transform = 'scaleX(' + pct / 100 + ')';
        progressLabel.textContent = (index + 1) + ' of ' + questions.length;
    }

    function renderQuestion(index) {
        setProgress(index);
        const q = questions[index];
        qContainer.innerHTML =
            '<p class="q-text">' + q.text + '</p>' +
            '<div class="answers">' +
            q.answers.map(function (a, i) {
                return '<button class="answer" data-idx="' + i + '">' + a.text + '</button>';
            }).join('') +
            '</div>';
        qContainer.className = 'quiz-q';

        qContainer.querySelectorAll('.answer').forEach(function (btn) {
            btn.addEventListener('click', function () {
                btn.classList.add('selected');
                const aIdx = parseInt(btn.dataset.idx);
                const chosen = q.answers[aIdx];
                Object.entries(chosen.scores).forEach(function (kv) { scores[kv[0]] += kv[1]; });
                answerLog.push(aIdx);

                setTimeout(function () {
                    qContainer.className = 'quiz-q exit';
                    setTimeout(function () {
                        current++;
                        if (current < questions.length) {
                            renderQuestion(current);
                        } else {
                            showResult();
                        }
                    }, 300);
                }, 280);
            });
        });
    }

    function getWinner() {
        let winner = 'rise';
        let max = -1;
        Object.entries(scores).forEach(function (kv) {
            if (kv[1] > max) { max = kv[1]; winner = kv[0]; }
        });
        // Tie-breaking: favor the upward path
        const s = scores.spark, r = scores.rise, g = scores.reign;
        if (s === r && r > g) winner = 'rise';
        if (r === g && g > s) winner = 'rise';
        if (s === g && s > r) winner = 'rise';
        return winner;
    }

    function getParagraph(winner) {
        if (winner === 'spark') {
            return answerLog[1] <= 1 ? paragraphs.spark.tiny : paragraphs.spark.growing;
        }
        if (winner === 'rise') {
            return answerLog[2] >= 2 ? paragraphs.rise.earning : paragraphs.rise.close;
        }
        return answerLog[0] === 3 ? paragraphs.reign.established : paragraphs.reign.default;
    }

    function showResult() {
        const winner = getWinner();
        const para = getParagraph(winner);
        const link = tierLinks[winner];
        const label = tierLabels[winner];

        quizProgress.style.display = 'none';
        qContainer.style.display = 'none';
        rContainer.classList.remove('quiz-hidden');
        rContainer.innerHTML =
            '<span class="result-kicker">Your recommended path</span>' +
            '<span class="result-tier">' + winner.charAt(0).toUpperCase() + winner.slice(1) + '</span>' +
            '<p class="result-para">' + para + '</p>' +
            '<div class="result-actions">' +
            '<a href="' + link + '" class="btn btn-amber">' + label + '</a>' +
            '<button class="result-retry" id="retryBtn">Start over</button>' +
            '</div>';

        document.getElementById('retryBtn').addEventListener('click', function () {
            scores = { spark: 0, rise: 0, reign: 0 };
            answerLog = [];
            current = 0;
            quizProgress.style.display = '';
            qContainer.style.display = '';
            rContainer.classList.add('quiz-hidden');
            renderQuestion(0);
        });
    }

    renderQuestion(0);
})();
</script>
</body>
</html>
